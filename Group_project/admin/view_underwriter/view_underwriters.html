<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>View All Underwriters</title>
    <link rel="stylesheet" href="view_Underwriters.css">
   
    <!--Google Font-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <div class="container">

        <iframe src="../../components/sidebar/sidebar.html" class="sidebar-frame" frameborder="0">
        </iframe>
        <iframe
        src="../../components/navbar/navbar.html"
        
        class="navbar-frame"
        frameborder="0">
        </iframe>
        <!--====MAIN====-->

        <div class="content">

    <!-- Heading -->
    <section class="hero">

        <h1>View All Underwriters</h1>

        <div class="breadcrumb">
            <span>Home</span>
            <i class="fa-solid fa-angle-right"></i>
            <span>Underwriters</span>
            <i class="fa-solid fa-angle-right"></i>
            <span class="active">View All Underwriters</span>
        </div>

    </section>

    <!-- Card -->
    <div class="table-card">

        <!-- Top -->
        <div class="top-section">

            <div class="search-box">
                <i class="fa fa-search"></i>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search...">
            </div>

            <div class="filter-wrapper">

                <button class="filter-btn" id="filterBtn">
                    <i class="fa-solid fa-filter"></i>
                    Filter
                </button>

                <div class="filter-menu hidden" id="filterMenu">

                    <label>
                        <input
                            type="radio"
                            name="filterType"
                            value="name"
                            checked>
                        Name
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="filterType"
                            value="id">
                        Underwriter ID
                    </label>

                </div>

            </div>

        </div>

        <!-- Table -->

        <table id="underwriterTable">

            <thead>

            <tr>

                <th>#</th>
                <th>Underwriter ID</th>
                <th>Name</th>
                <th>Date of Birth</th>
                <th>Joining Date</th>
                <th>Status</th>

            </tr>

            </thead>

            <tbody id="underwriterTableBody">

            </tbody>

        </table>

        <!-- Bottom -->

        <div class="bottom">

            <p>Showing 2 of 2 entries</p>

            <div class="pagination">

                <button>Previous</button>

                <button class="current">1</button>

                <button>Next</button>

            </div>

        </div>

    </div>

</div>
 <script src="view_Underwriters.js"></script>
</body>

</html>
