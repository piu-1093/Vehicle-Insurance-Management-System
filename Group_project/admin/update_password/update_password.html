<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <link rel="stylesheet" href="update_password.css">
</head>

<body>

    <iframe src="../../components/sidebar/sidebar.html" class="sidebar-frame" frameborder="0">
    </iframe>
    <iframe
        src="../../components/navbar/navbar.html"
        
        class="navbar-frame"
        frameborder="0">
        </iframe>

    <!--Main Content-->
    <div class="main-content">



        <!--Breadcrumb-->
        <div class="page-header">

            <div class="page-info">
                <h1>Update Password</h1>

                <div class="breadcrumb">
                    Home > Update Password
                </div>
            </div>

            

        </div>

        <!--Main Form Card-->
        <div class="container">

            <label for="underwriterId">
                UnderWriter ID
            </label>

            <input type="text" id="underwriterId" placeholder="Enter UnderWriter ID (e.g., UW1001)">
            <button onclick="searchUnderwriter()" class="search-btn">
                Search
            </button>

            <div id="passwordSection" style="display:none;">

                <div id="underwriterInfo" class="underwriter-info">
                    <strong>Underwriter Name:</strong>
                    <span id="underwriterName"></span>
                </div>

                <label for="currentPassword">
                    Current Password
                </label>

                <input type="password" id="currentPassword" placeholder="Enter Current Password">

                <label for="newPassword">
                    New Password
                </label>

                <input type="password" id="newPassword" placeholder="Enter New Password">

                <label for="confirmPassword">
                    Confirm Password
                </label>

                <input type="password" id="confirmPassword" placeholder="Re-enter New Password">

                <button onclick="updatePassword()" class="update-btn">
                    Update
                </button>

            </div>

            <div id="resultCard"></div>

            <div class="button-group">

                <button class="back-btn"
                onclick="window.location.href='../admin_dashboard/admin_dashboard.html'">
                    ⬅ Back
                </button>

            </div>



        </div>

        <div id="messageModal" class="modal">
            <div class="modal-content">

                <div id="modalHeader" class="modal-header">
                    <h3 id="modalTitle">Message</h3>
                </div>

                <div class="modal-body">

                    <p id="modalMessage"></p>

                    <div class="modal-footer">
                        <button class="modal-btn" onclick="closeModal()">
                            OK
                        </button>
                    </div>

                </div>

            </div>
        </div>

        <script src="update_password.js"></script>

</body>

</html>
