<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Policies</title>
    <link rel="stylesheet" href="view_policy.css">
</head>
<body>


<div class="main-content">
    
    <iframe
    src="../../components/sidebar_underwriter/sidebar_underwriter.html"
    
    class="sidebar-frame"
    frameborder="0">
    </iframe>
    <iframe
        src="../../components/navbar/navbar.html"
        
        class="navbar-frame"
        frameborder="0">
        </iframe>

    <div class="container">


        <div class="header">
            <h1>Policy Management</h1>
            <p>View All Available Policies</p>
        </div>


        <div class="table-container">
            <table id="policyTable">


                <thead>
                    <tr>
                        <th>Policy No</th>
                        <th>Vehicle No</th>
                        <th>Vehicle Type</th>
                        <th>Customer Name</th>
                        <th>Engine No</th>
                        <th>Chassis No</th>
                        <th>Phone No</th>
                        <th>Insurance Type</th>
                        <th>Premium Amount</th>
                        <th>From Date</th>
                        <th>To Date</th>
                        <th>Status</th>
                    </tr>
                </thead>


                <tbody id="policyBody">
                </tbody>


            </table>
        </div>


    </div>


    

    


</div>


<script src="view_policy.js"></script>
</body>
</html>
