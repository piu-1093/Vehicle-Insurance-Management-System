<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Policies</title>
    <link rel="stylesheet" href="view_policy.css">
</head>
<body>


<div class="main-content">
    
    <iframe
    src="../../components/sidebar_underwriter/sidebar_underwriter.html"
    
    class="sidebar-frame"
    frameborder="0">
    </iframe>
    <iframe
        src="../../components/navbar/navbar.html"
        
        class="navbar-frame"
        frameborder="0">
        </iframe>

    <div class="container">


        <div class="header">
            <h1>Policy Management</h1>
            <p>View All Available Policies</p>
        </div>

        <div class="search-bar-container" style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
            <input 
                type="text" 
                id="policySearchInput" 
                placeholder="🔍 Search by Policy Number..." 
                style="padding: 12px 20px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; width: 350px; outline: none; transition: 0.3s; background: white;"
            >
            <select 
                id="vehicleTypeFilter" 
                style="padding: 12px 20px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; background: white; transition: 0.3s; cursor: pointer; color: var(--text);"
            >
                <option value="">All Vehicle Types</option>
                <option value="2 Wheeler">2 Wheeler</option>
                <option value="4 Wheeler">4 Wheeler</option>
            </select>
            <select 
                id="insuranceTypeFilter" 
                style="padding: 12px 20px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; background: white; transition: 0.3s; cursor: pointer; color: var(--text);"
            >
                <option value="">All Insurance Types</option>
                <option value="Full Insurance">Full Insurance</option>
                <option value="Third Party">Third Party</option>
            </select>
        </div>

        <div class="table-container">
            <table id="policyTable">


                <thead>
                    <tr>
                        <th>Policy No</th>
                        <th>Vehicle No</th>
                        <th>Vehicle Type</th>
                        <th>Customer Name</th>
                        <th>Engine No</th>
                        <th>Chassis No</th>
                        <th>Phone No</th>
                        <th>Insurance Type</th>
                        <th>Premium Amount</th>
                        <th>From Date</th>
                        <th>To Date</th>
                        <th>Status</th>
                    </tr>
                </thead>


                <tbody id="policyBody">
                </tbody>


            </table>
        </div>


    </div>


    

    


</div>


<script src="view_policy.js"></script>
</body>
</html>
